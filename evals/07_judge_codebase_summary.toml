# Free-form synthesis: needs LLM-as-judge grading.
# Tests: can the planner produce a useful 2-sentence project description?

name = "judge_codebase_summary"
goal = "Read the workspace's Cargo.toml + the agent-cli crate's lib/main entrypoint, then write a 2-sentence description of what this project does. No header, no list — just two sentences."
mode = "read"
max_turns = 5

[grade]
kind = "judge"
rubric = '''
PASS criteria:
- Exactly 2 sentences (period-terminated). Mid-sentence periods like "1.0" don't count.
- Mentions that this is an agent / LLM kernel / planner-loop in some form.
- Mentions at least one concrete fact derivable from Cargo.toml or main.rs (e.g. that the binary is `seed`, that it's a Rust workspace, that it supports multiple LLM backends, that subcommands exist).

FAIL if:
- Wrong sentence count (1 or 3+).
- Generic "AI-powered tool" with zero concrete facts.
- Hallucinated facts (e.g. claims it does database queries).
'''
